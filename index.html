<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Promediado</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 100%;
    max-width: 420px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
}

button:hover {
    background: #2563eb;
}

.result {
    margin-top: 15px;
    padding: 10px;
    background: #0f172a;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
<h2>Calculadora de Promediado</h2>

<input id="acciones" placeholder="Acciones actuales" type="number">
<input id="precio" placeholder="Precio promedio compra" type="number">
<input id="actual" placeholder="Precio actual" type="number">
<input id="porcentaje" placeholder="% a bajar promedio" type="number">

<button onclick="calcular()">Calcular</button>
<button onclick="limpiar()" style="background:#ef4444;">Limpiar</button>

<div class="result" id="resultado"></div>
</div>

<script>
function calcular() {

let A0 = parseFloat(document.getElementById("acciones").value);
let P0 = parseFloat(document.getElementById("precio").value);
let M = parseFloat(document.getElementById("actual").value);
let r = parseFloat(document.getElementById("porcentaje").value);

if (!A0 || !P0 || !M || r <= 0) {
document.getElementById("resultado").innerHTML =
"⚠️ Completa todos los campos correctamente.";
return;
}

let T = P0 * (1 - r / 100);

if (T <= M) {
document.getElementById("resultado").innerHTML =
"❌ No es posible alcanzar ese promedio con el precio actual.";
return;
}

let N = (A0 * (P0 - T)) / (T - M);

let inversion = N * M;

let nuevo_promedio = ((A0 * P0) + (N * M)) / (A0 + N);

document.getElementById("resultado").innerHTML =
"📊 Acciones a comprar: <b>" + N.toFixed(2) + "</b><br>" +
"💰 Inversión necesaria: <b>$" + inversion.toFixed(2) + "</b><br>" +
"📉 Nuevo promedio: <b>$" + nuevo_promedio.toFixed(2) + "</b><br>" +
"📦 Total acciones: <b>" + (A0 + N).toFixed(2) + "</b>";
}

function limpiar() {
document.getElementById("acciones").value = "";
document.getElementById("precio").value = "";
document.getElementById("actual").value = "";
document.getElementById("porcentaje").value = "";
document.getElementById("resultado").innerHTML = "";
}
</script>

</body>
</html>
