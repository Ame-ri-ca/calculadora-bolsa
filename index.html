<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Promediado Inteligente</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 100%;
    max-width: 450px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
}

button:hover {
    background: #2563eb;
}

.result {
    margin-top: 15px;
    padding: 10px;
    background: #0f172a;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
<h2>Calculadora Inteligente</h2>

<input id="acciones" placeholder="Acciones actuales" type="number">
<input id="precioCompra" placeholder="Precio de compra" type="number">
<input id="precioActual" placeholder="Precio actual" type="number">

<button onclick="calcular()">Calcular</button>
<button onclick="limpiar()" style="background:#ef4444;">Limpiar</button>

<div class="result" id="resultado"></div>
</div>

<script>

function calcular() {

let A0 = parseFloat(document.getElementById("acciones").value);
let P0 = parseFloat(document.getElementById("precioCompra").value);
let M = parseFloat(document.getElementById("precioActual").value);

if (!A0 || !P0 || !M) {
document.getElementById("resultado").innerHTML =
"⚠️ Completa todos los campos correctamente.";
return;
}

/////////////////////////////
// 1. DEVALUACIÓN AUTOMÁTICA
/////////////////////////////

let devaluacion = (P0 - M) / P0;

// precio ajustado
let precioAjustado = M * (1 - devaluacion);

/////////////////////////////
// 2. VALOR POSICIÓN
/////////////////////////////

let valorPosicion = A0 * P0;

/////////////////////////////
// 3. ACCIONES A COMPRAR
/////////////////////////////

let N = valorPosicion / precioAjustado;

/////////////////////////////
// 4. PRECIO FINAL (OPCIÓN B)
/////////////////////////////

let nuevoTotalAcciones = A0 + N;
let nuevoTotalInvertido = valorPosicion + (N * precioAjustado);

let precioFinal = nuevoTotalInvertido / nuevoTotalAcciones;

/////////////////////////////
// OUTPUT
/////////////////////////////

document.getElementById("resultado").innerHTML = `
📉 Devaluación automática: <b>${(devaluacion * 100).toFixed(2)}%</b><br><br>

💰 Precio ajustado: <b>$${precioAjustado.toFixed(2)}</b><br>

📦 Acciones a comprar: <b>${N.toFixed(2)}</b><br>

📊 Precio final (nuevo promedio): <b>$${precioFinal.toFixed(2)}</b>
`;
}

function limpiar() {
document.getElementById("acciones").value = "";
document.getElementById("precioCompra").value = "";
document.getElementById("precioActual").value = "";
document.getElementById("resultado").innerHTML = "";
}

</script>

</body>
</html>
